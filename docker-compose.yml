services:
  # ---------- Redis ----------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------- FastAPI ----------
  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    depends_on:
      redis:
        condition: service_healthy

  # ---------- RQ Workers ----------
  workers:
    build: .
    # Default CMD in the Dockerfile is already "python main.py"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NUM_VIDEO_WORKERS=${NUM_VIDEO_WORKERS:-2}
      - NUM_CLIP_WORKERS=${NUM_CLIP_WORKERS:-2}
      - VIDEO_JOB_TIMEOUT=${VIDEO_JOB_TIMEOUT:-1800}
      - CLIP_JOB_TIMEOUT=${CLIP_JOB_TIMEOUT:-1800}
    volumes:
      - video_data:/tmp/video_clipper
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  video_data:
