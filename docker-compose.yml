services:
  # ---------- MinIO (S3-compatible object storage) ----------
  # Web console: http://localhost:9001   API: http://localhost:9000
  # Default credentials: MINIO_ROOT_USER / MINIO_ROOT_PASSWORD
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    mem_limit: ${MINIO_MEM_LIMIT:-1g}
    cpus: ${MINIO_CPU_LIMIT:-1}

  # ---------- MinIO bucket init (one-shot) ----------
  # Creates the required buckets on first run, then exits.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set clipry http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing clipry/generated-clips;
      mc mb --ignore-existing clipry/raw-videos;
      mc mb --ignore-existing clipry/avatars;
      mc mb --ignore-existing clipry/layouts;
      echo 'MinIO buckets ready';
      "
    environment:
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    restart: "no"

  # ---------- Cloudflare Tunnel for API (api.clipscut.pro) ----------
  # Run on the host with the example config in workers/cloudflared/:
  #   cloudflared tunnel run
  # The tunnel must route api.clipscut.pro -> http://127.0.0.1:7050
  #
  # ---------- Cloudflare Tunnel for MinIO (storage.clipscut.pro) ----------
  # Run on the host (not in Docker) to avoid pulling the cloudflared image:
  #   cloudflared tunnel run clipscut-storage
  # The tunnel must route storage.clipscut.pro -> http://localhost:9000

  # ---------- Caddy (reverse proxy + load balancer behind Cloudflare Tunnel) ----------
  # Tunnel-backed production listens on :7050.
  # If you move to direct Caddy TLS on 80/443, update docker-compose,
  # CADDY_DOMAIN, and your edge routing together.
  caddy:
    image: caddy:2-alpine
    ports:
      - "7050:7050"
    environment:
      - CADDY_DOMAIN=${CADDY_DOMAIN:-:7050}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: ${CADDY_MEM_LIMIT:-256m}
    cpus: ${CADDY_CPU_LIMIT:-0.5}

  # ---------- Redis ----------
  # SECURITY: Set REDIS_PASSWORD in your .env file before deploying.
  # The default "changeme" is for local development only.
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"
      - "--maxmemory"
      - "${REDIS_MAXMEMORY:-1500mb}"
      - "--maxmemory-policy"
      - "noeviction"
      - "--appendonly"
      - "yes"
      - "--appendfsync"
      - "everysec"
    # SECURITY: Do not expose Redis to the host network in production.
    # Uncomment only for local development if needed.
    # ports:
    #   - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    # Runtime limits for docker compose (non-swarm).
    mem_limit: ${REDIS_MEM_LIMIT:-2g}
    cpus: ${REDIS_CPU_LIMIT:-1}

  # ---------- FastAPI (gunicorn + uvicorn workers) ----------
  # Scale with: docker compose up --scale api=3
  # Or set API_REPLICAS in .env and use deploy.replicas below.
  api:
    build: .
    command: gunicorn api:app -w ${API_WORKERS:-2} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8001
    expose:
      - "8001"
    deploy:
      replicas: ${API_REPLICAS:-1}
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEDIA_STORAGE_PROVIDER=${MEDIA_STORAGE_PROVIDER:-minio}
      - LOCAL_MEDIA_ROOT=${LOCAL_MEDIA_ROOT:-/tmp/video_clipper/media}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      - WORKER_PUBLIC_BASE_URL=${WORKER_PUBLIC_BASE_URL:-}
      - WORKER_MEDIA_SIGNING_SECRET=${WORKER_MEDIA_SIGNING_SECRET:-}
      - WORKER_INTERNAL_API_TOKEN=${WORKER_INTERNAL_API_TOKEN:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MAX_CONNECTIONS=${API_REDIS_MAX_CONNECTIONS:-15}
      - REDIS_CONNECTION_ALERT_THRESHOLD=${REDIS_CONNECTION_ALERT_THRESHOLD:-0.8}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - CAPTION_FONTS_DIR=${CAPTION_FONTS_DIR:-/app/assets/fonts}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_ANALYZER_MODEL=${OPENAI_ANALYZER_MODEL:-gpt-4.1-mini}
      - OPENAI_ANALYZER_FALLBACK_MODELS=${OPENAI_ANALYZER_FALLBACK_MODELS:-gpt-4.1-mini,gpt-4.1}
      - WORKER_SCALE_ADMIN_USER_IDS=${WORKER_SCALE_ADMIN_USER_IDS:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
      - CORS_ALLOWED_ORIGIN_REGEX=${CORS_ALLOWED_ORIGIN_REGEX:-}
      - YTDLP_COOKIES_SOURCE_FILE=${YTDLP_COOKIES_SOURCE_FILE:-}
      - YTDLP_COOKIES_FILE=/tmp/video_clipper/yt-dlp/cookies.txt
      - YTDLP_PROXY=${YTDLP_PROXY:-}
      - YTDLP_PROXY_LIST=${YTDLP_PROXY_LIST:-}

      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SENTRY_DSN=${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/ready')\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    volumes:
      - video_data:/tmp/video_clipper
      - type: bind
        source: ${YTDLP_COOKIES_SECRET_DIR:-./secrets}
        target: /run/secrets
        read_only: true
        bind:
          create_host_path: true
    mem_limit: ${API_MEM_LIMIT:-2g}
    cpus: ${API_CPU_LIMIT:-2}

  # ---------- Video Workers (CPU + memory heavy: Whisper) ----------
  video-workers:
    build: .
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    pids_limit: ${VIDEO_WORKERS_PIDS_LIMIT:-512}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, signal; os.kill(1, 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEDIA_STORAGE_PROVIDER=${MEDIA_STORAGE_PROVIDER:-minio}
      - LOCAL_MEDIA_ROOT=${LOCAL_MEDIA_ROOT:-/tmp/video_clipper/media}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      - WORKER_PUBLIC_BASE_URL=${WORKER_PUBLIC_BASE_URL:-}
      - WORKER_MEDIA_SIGNING_SECRET=${WORKER_MEDIA_SIGNING_SECRET:-}
      - WORKER_INTERNAL_API_TOKEN=${WORKER_INTERNAL_API_TOKEN:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - YTDLP_COOKIES_SOURCE_FILE=${YTDLP_COOKIES_SOURCE_FILE:-}
      - YTDLP_COOKIES_FILE=/tmp/video_clipper/yt-dlp/cookies.txt
      - YTDLP_PROXY=${YTDLP_PROXY:-}
      - YTDLP_PROXY_LIST=${YTDLP_PROXY_LIST:-}

      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-80}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - CAPTION_FONTS_DIR=${CAPTION_FONTS_DIR:-/app/assets/fonts}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_ANALYZER_MODEL=${OPENAI_ANALYZER_MODEL:-gpt-4.1-mini}
      - OPENAI_ANALYZER_FALLBACK_MODELS=${OPENAI_ANALYZER_FALLBACK_MODELS:-gpt-4.1-mini,gpt-4.1}
      - CLAUDE_ANALYZER_MODEL=${CLAUDE_ANALYZER_MODEL:-claude-4-5-haiku-latest}
      - CLAUDE_ANALYZER_FALLBACK_MODELS=${CLAUDE_ANALYZER_FALLBACK_MODELS:-claude-4-5-haiku-latest,claude-3-5-haiku-latest,claude-3-5-sonnet-latest,claude-3-haiku-20240307}
      - RAW_VIDEO_STORAGE_BUCKET=${RAW_VIDEO_STORAGE_BUCKET:-raw-videos}
      - SUPERVISOR_ROLE=worker
      - WORKER_INSTANCE_ID=${WORKER_INSTANCE_ID:-}
      - WORKER_MODE=video
      - NUM_VIDEO_WORKERS=${NUM_VIDEO_WORKERS:-4}
      - NUM_CLIP_WORKERS=0
      - RESET_WORKER_SCALE_ON_START=${RESET_WORKER_SCALE_ON_START:-true}
      - FAIL_STARTED_JOBS_ON_START=${FAIL_STARTED_JOBS_ON_START:-true}
      - FAIL_PROCESSING_ROWS_ON_START=${FAIL_PROCESSING_ROWS_ON_START:-true}
      - PURGE_QUEUED_JOBS_ON_START=${PURGE_QUEUED_JOBS_ON_START:-false}
      - VIDEO_JOB_TIMEOUT=${VIDEO_JOB_TIMEOUT:-1800}
      - CLIP_JOB_TIMEOUT=${CLIP_JOB_TIMEOUT:-1800}
      - RAW_VIDEO_CLEANUP_INTERVAL_SECONDS=${RAW_VIDEO_CLEANUP_INTERVAL_SECONDS:-300}
      - MAINTENANCE_LEADER_LOCK_TTL_SECONDS=${MAINTENANCE_LEADER_LOCK_TTL_SECONDS:-15}
      - MAINTENANCE_LEADER_RENEW_SECONDS=${MAINTENANCE_LEADER_RENEW_SECONDS:-5}
      - FFMPEG_THREADS=${FFMPEG_THREADS:-2}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - video_data:/tmp/video_clipper
      - type: bind
        source: ${YTDLP_COOKIES_SECRET_DIR:-./secrets}
        target: /run/secrets
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: ${VIDEO_WORKERS_MEM_LIMIT:-16g}
    cpus: ${VIDEO_WORKERS_CPU_LIMIT:-4}

  # ---------- Clip Workers (CPU + IO heavy: FFmpeg) ----------
  clip-workers:
    build: .
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    pids_limit: ${CLIP_WORKERS_PIDS_LIMIT:-512}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, signal; os.kill(1, 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEDIA_STORAGE_PROVIDER=${MEDIA_STORAGE_PROVIDER:-minio}
      - LOCAL_MEDIA_ROOT=${LOCAL_MEDIA_ROOT:-/tmp/video_clipper/media}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      - WORKER_PUBLIC_BASE_URL=${WORKER_PUBLIC_BASE_URL:-}
      - WORKER_MEDIA_SIGNING_SECRET=${WORKER_MEDIA_SIGNING_SECRET:-}
      - WORKER_INTERNAL_API_TOKEN=${WORKER_INTERNAL_API_TOKEN:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - YTDLP_COOKIES_SOURCE_FILE=${YTDLP_COOKIES_SOURCE_FILE:-}
      - YTDLP_COOKIES_FILE=/tmp/video_clipper/yt-dlp/cookies.txt
      - YTDLP_PROXY=${YTDLP_PROXY:-}
      - YTDLP_PROXY_LIST=${YTDLP_PROXY_LIST:-}

      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-80}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - CAPTION_FONTS_DIR=${CAPTION_FONTS_DIR:-/app/assets/fonts}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_ANALYZER_MODEL=${OPENAI_ANALYZER_MODEL:-gpt-4.1-mini}
      - OPENAI_ANALYZER_FALLBACK_MODELS=${OPENAI_ANALYZER_FALLBACK_MODELS:-gpt-4.1-mini,gpt-4.1}
      - CLAUDE_ANALYZER_MODEL=${CLAUDE_ANALYZER_MODEL:-claude-4-5-haiku-latest}
      - CLAUDE_ANALYZER_FALLBACK_MODELS=${CLAUDE_ANALYZER_FALLBACK_MODELS:-claude-4-5-haiku-latest,claude-3-5-haiku-latest,claude-3-5-sonnet-latest,claude-3-haiku-20240307}
      - RAW_VIDEO_STORAGE_BUCKET=${RAW_VIDEO_STORAGE_BUCKET:-raw-videos}
      - SUPERVISOR_ROLE=worker
      - WORKER_INSTANCE_ID=${WORKER_INSTANCE_ID:-}
      - WORKER_MODE=clip
      - NUM_VIDEO_WORKERS=0
      - NUM_CLIP_WORKERS=${NUM_CLIP_WORKERS:-4}
      - RESET_WORKER_SCALE_ON_START=${RESET_WORKER_SCALE_ON_START:-true}
      - FAIL_STARTED_JOBS_ON_START=${FAIL_STARTED_JOBS_ON_START:-true}
      - FAIL_PROCESSING_ROWS_ON_START=${FAIL_PROCESSING_ROWS_ON_START:-true}
      - PURGE_QUEUED_JOBS_ON_START=${PURGE_QUEUED_JOBS_ON_START:-false}
      - VIDEO_JOB_TIMEOUT=${VIDEO_JOB_TIMEOUT:-1800}
      - CLIP_JOB_TIMEOUT=${CLIP_JOB_TIMEOUT:-1800}
      - CLIP_ASSET_CLEANUP_INTERVAL_SECONDS=${CLIP_ASSET_CLEANUP_INTERVAL_SECONDS:-300}
      - MAINTENANCE_LEADER_LOCK_TTL_SECONDS=${MAINTENANCE_LEADER_LOCK_TTL_SECONDS:-15}
      - MAINTENANCE_LEADER_RENEW_SECONDS=${MAINTENANCE_LEADER_RENEW_SECONDS:-5}
      - FFMPEG_THREADS=${FFMPEG_THREADS:-2}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - video_data:/tmp/video_clipper
      - type: bind
        source: ${YTDLP_COOKIES_SECRET_DIR:-./secrets}
        target: /run/secrets
        read_only: true
        bind:
          create_host_path: true
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: ${CLIP_WORKERS_MEM_LIMIT:-16g}
    cpus: ${CLIP_WORKERS_CPU_LIMIT:-4}

  # ---------- Social Workers (lightweight: HTTP uploads to platform APIs) ----------
  social-workers:
    build: .
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    pids_limit: ${SOCIAL_WORKERS_PIDS_LIMIT:-256}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, signal; os.kill(1, 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEDIA_STORAGE_PROVIDER=${MEDIA_STORAGE_PROVIDER:-minio}
      - LOCAL_MEDIA_ROOT=${LOCAL_MEDIA_ROOT:-/tmp/video_clipper/media}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      - WORKER_PUBLIC_BASE_URL=${WORKER_PUBLIC_BASE_URL:-}
      - WORKER_MEDIA_SIGNING_SECRET=${WORKER_MEDIA_SIGNING_SECRET:-}
      - WORKER_INTERNAL_API_TOKEN=${WORKER_INTERNAL_API_TOKEN:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-40}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - CAPTION_FONTS_DIR=${CAPTION_FONTS_DIR:-/app/assets/fonts}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPERVISOR_ROLE=worker
      - WORKER_INSTANCE_ID=${WORKER_INSTANCE_ID:-}
      - WORKER_MODE=social
      - NUM_VIDEO_WORKERS=0
      - NUM_CLIP_WORKERS=0
      - NUM_SOCIAL_WORKERS=${NUM_SOCIAL_WORKERS:-2}
      - RESET_WORKER_SCALE_ON_START=${RESET_WORKER_SCALE_ON_START:-true}
      - SOCIAL_JOB_TIMEOUT=${SOCIAL_JOB_TIMEOUT:-1800}
      - SOCIAL_ACCOUNT_ENCRYPTION_KEY=${SOCIAL_ACCOUNT_ENCRYPTION_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - TIKTOK_CLIENT_KEY=${TIKTOK_CLIENT_KEY}
      - TIKTOK_CLIENT_SECRET=${TIKTOK_CLIENT_SECRET}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
    volumes:
      - video_data:/tmp/video_clipper
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: ${SOCIAL_WORKERS_MEM_LIMIT:-2g}
    cpus: ${SOCIAL_WORKERS_CPU_LIMIT:-2}

  # ---------- Maintenance Supervisor (single logical leader via Redis lock) ----------
  maintenance-supervisor:
    build: .
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, signal; os.kill(1, 0)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - MEDIA_STORAGE_PROVIDER=${MEDIA_STORAGE_PROVIDER:-minio}
      - LOCAL_MEDIA_ROOT=${LOCAL_MEDIA_ROOT:-/tmp/video_clipper/media}
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      - WORKER_PUBLIC_BASE_URL=${WORKER_PUBLIC_BASE_URL:-}
      - WORKER_MEDIA_SIGNING_SECRET=${WORKER_MEDIA_SIGNING_SECRET:-}
      - WORKER_INTERNAL_API_TOKEN=${WORKER_INTERNAL_API_TOKEN:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - MINIO_PUBLIC_ENDPOINT=${MINIO_PUBLIC_ENDPOINT:-}
      - MINIO_REGION=${MINIO_REGION:-us-east-1}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MAX_CONNECTIONS=${REDIS_MAX_CONNECTIONS:-40}
      - TEMP_DIR=${TEMP_DIR:-/tmp/video_clipper}
      - CAPTION_FONTS_DIR=${CAPTION_FONTS_DIR:-/app/assets/fonts}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_ANALYZER_MODEL=${OPENAI_ANALYZER_MODEL:-gpt-4.1-mini}
      - OPENAI_ANALYZER_FALLBACK_MODELS=${OPENAI_ANALYZER_FALLBACK_MODELS:-gpt-4.1-mini,gpt-4.1}
      - CLAUDE_ANALYZER_MODEL=${CLAUDE_ANALYZER_MODEL:-claude-4-5-haiku-latest}
      - CLAUDE_ANALYZER_FALLBACK_MODELS=${CLAUDE_ANALYZER_FALLBACK_MODELS:-claude-4-5-haiku-latest,claude-3-5-haiku-latest,claude-3-5-sonnet-latest,claude-3-haiku-20240307}
      - RAW_VIDEO_STORAGE_BUCKET=${RAW_VIDEO_STORAGE_BUCKET:-raw-videos}
      - SUPERVISOR_ROLE=maintenance
      - MAINTENANCE_LEADER_LOCK_TTL_SECONDS=${MAINTENANCE_LEADER_LOCK_TTL_SECONDS:-15}
      - MAINTENANCE_LEADER_RENEW_SECONDS=${MAINTENANCE_LEADER_RENEW_SECONDS:-5}
      - PROCESSING_JOB_STALE_SECONDS=${PROCESSING_JOB_STALE_SECONDS:-2100}
      - RAW_VIDEO_CLEANUP_INTERVAL_SECONDS=${RAW_VIDEO_CLEANUP_INTERVAL_SECONDS:-300}
      - CLIP_ASSET_CLEANUP_INTERVAL_SECONDS=${CLIP_ASSET_CLEANUP_INTERVAL_SECONDS:-300}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-1}
    volumes:
      - video_data:/tmp/video_clipper
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: ${MAINTENANCE_MEM_LIMIT:-1g}
    cpus: ${MAINTENANCE_CPU_LIMIT:-1}

volumes:
  caddy_data:
  caddy_config:
  redis_data:
  video_data:
  minio_data:
